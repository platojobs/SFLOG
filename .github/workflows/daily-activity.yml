name: Daily Repo Pulse

on:
  schedule:
    # 每天 UTC 02:30（北京时间约 10:30），与 flutter.ffi 错开
    - cron: '30 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-sflog-pulse
  cancel-in-progress: false

jobs:
  pulse:
    runs-on: ubuntu-latest
    steps:
      # 不要用空的 PERSONAL_TOKEN 做 checkout，否则会报 token required
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Update daily pulse data
        run: python3 scripts/update-repo-pulse.py

      - name: Commit and push as platojobs
        env:
          TOKEN: ${{ secrets.PERSONAL_TOKEN }}
          COMMIT_NAME: ${{ vars.ACTIVITY_COMMIT_NAME || 'platojobs' }}
          COMMIT_EMAIL: ${{ vars.ACTIVITY_COMMIT_EMAIL || 'platojobs@qq.com' }}
          GIT_AUTHOR_NAME: ${{ vars.ACTIVITY_COMMIT_NAME || 'platojobs' }}
          GIT_AUTHOR_EMAIL: ${{ vars.ACTIVITY_COMMIT_EMAIL || 'platojobs@qq.com' }}
          GIT_COMMITTER_NAME: ${{ vars.ACTIVITY_COMMIT_NAME || 'platojobs' }}
          GIT_COMMITTER_EMAIL: ${{ vars.ACTIVITY_COMMIT_EMAIL || 'platojobs@qq.com' }}
        run: |
          git config user.name "$COMMIT_NAME"
          git config user.email "$COMMIT_EMAIL"

          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git add data/repo-pulse.json ACTIVITY.md
          git commit \
            --author="$COMMIT_NAME <$COMMIT_EMAIL>" \
            -m "chore: daily repo pulse $(date -u +%Y-%m-%d)"

          echo "Commit metadata:"
          git log -1 --format=fuller

          if [ -n "$TOKEN" ]; then
            git push "https://x-access-token:${TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main
          else
            echo "::warning::未配置 PERSONAL_TOKEN，使用 GITHUB_TOKEN 推送。请在 Settings → Secrets → Actions 添加 platojobs 的 PAT（repo），绿格子才计入个人账号。"
            git push origin HEAD:main
          fi
